<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Charly Cursos</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #070a0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container-login {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      padding: 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 999px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #60d6ff, #5a6bff);
      color: white;
    }

    .switch {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }

    hr {
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<div class="container-login">

  <!-- LOGIN -->
  <h2>Ingresar</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar al campus</button>

  <div class="switch">¿No tenés cuenta? Registrate abajo 👇</div>

  <hr>

  <!-- REGISTRO -->
  <h2>Inscribirme</h2>
  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="text" id="whatsapp" placeholder="WhatsApp">
  <input type="email" id="email_reg" placeholder="Email">
  <input type="password" id="password_reg" placeholder="Contraseña">
  <button onclick="register()">Crear cuenta</button>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
  const supabaseClient = supabase.createClient(
    "https://yfdiejyrhaaziceyeiuc.supabase.co",
    "sb_publishable_frXqVXDILy3hgUFvp341pA_qqZdcQ_d"
  );

  async function register() {
    const email = document.getElementById("email_reg").value;
    const password = document.getElementById("password_reg").value;

    const { error } = await supabaseClient.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Cuenta creada correctamente. Ahora podés iniciar sesión.");
    }
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password
    });

    if (error) {
      alert("Error: " + error.message);
    } else {
      window.location.href = "campus.html";
    }
  }
</script>

</body>
</html>
