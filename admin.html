<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin | Charly Cursos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#070a0f;color:white}
    .container{width:min(1100px,92%);margin:auto;padding:24px 0}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
    h1{margin:0;font-size:32px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:white;font-weight:700;text-decoration:none;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,rgba(96,214,255,.28),rgba(90,107,255,.22));border-color:rgba(96,214,255,.25)}
    .btn-ok{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.35)}
    .btn-bad{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.35)}
    .panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:20px;padding:16px}
    .status,.muted{color:rgba(255,255,255,.62);font-size:14px;line-height:1.45}
    .grid{display:grid;gap:12px;margin-top:16px}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px}
    .card-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .card h3{margin:0 0 4px;font-size:20px}
    .tag{display:inline-flex;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);font-size:12px;font-weight:800}
    .tag-pendiente{color:#fde68a;border-color:rgba(253,230,138,.28)}
    .tag-aprobado{color:#86efac;border-color:rgba(134,239,172,.28)}
    .tag-corregir{color:#fca5a5;border-color:rgba(252,165,165,.28)}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    textarea,select{width:100%;margin-top:10px;border:none;border-radius:12px;padding:12px;box-sizing:border-box;font-family:inherit}
    textarea{min-height:70px;resize:vertical}
    .unlock{margin-top:12px;padding:12px;border-radius:14px;background:rgba(96,214,255,.08);border:1px solid rgba(96,214,255,.15)}
  </style>
</head>

<body>
<div class="container">
  <div class="top">
    <div>
      <h1>Panel de entregas</h1>
      <div class="muted">Charly puede corregir trabajos y habilitar clases.</div>
    </div>
    <div>
      <a class="btn" href="campus.html">Volver al campus</a>
      <button class="btn btn-primary" onclick="cargarEntregas()">Actualizar</button>
    </div>
  </div>

  <div class="panel">
    <div id="status" class="status">Cargando entregas...</div>
    <div id="lista" class="grid"></div>
  </div>
</div>

<script>
const supabaseUrl = "https://yfdiejyrhaaziceyeiuc.supabase.co";
const supabaseKey = "sb_publishable_fRXqVXDILy3hgUFvp341pA_qqZdcQ_d";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

function estadoClase(estado){
  if(estado === "aprobado") return "tag tag-aprobado";
  if(estado === "corregir") return "tag tag-corregir";
  return "tag tag-pendiente";
}

function fechaLinda(fecha){
  return fecha ? new Date(fecha).toLocaleString("es-AR") : "";
}

function cursoKey(curso){
  const c = (curso || "").toLowerCase();
  if(c.includes("nutric")) return "nutricion";
  if(c.includes("funcional") || c.includes("hiit")) return "hiit";
  if(c.includes("muscul")) return "musculacion";
  return "personal";
}

async function cargarEntregas(){
  const status = document.getElementById("status");
  const lista = document.getElementById("lista");
  status.innerText = "Cargando entregas...";
  lista.innerHTML = "";

  const { data, error } = await supabase
    .from("entregas")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    status.innerText = "Error cargando entregas: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    status.innerText = "Todavía no hay trabajos enviados.";
    return;
  }

  status.innerText = "Total de entregas: " + data.length;

  data.forEach(entrega => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-top">
        <div>
          <h3>${entrega.nombre || "Alumno sin nombre"}</h3>
          <div class="muted">${entrega.user_email || "Sin email"}</div>
          <div class="muted">Curso: <strong>${entrega.curso || "Sin curso"}</strong></div>
          <div class="muted">Fecha: ${fechaLinda(entrega.created_at)}</div>
        </div>
        <span class="${estadoClase(entrega.estado)}">${entrega.estado || "pendiente"}</span>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="${entrega.archivo_url}" target="_blank">Abrir archivo</a>
        <button class="btn btn-bad" onclick="actualizarEstado('${entrega.id}', 'corregir')">Pedir corrección</button>
        <button class="btn" onclick="actualizarEstado('${entrega.id}', 'pendiente')">Pendiente</button>
      </div>

      <div class="unlock">
        <div class="muted">Elegí hasta qué clase queda habilitado este alumno:</div>
        <select id="clase-${entrega.id}">
          <option value="1">Clase 1</option>
          <option value="2">Clase 2</option>
          <option value="3">Clase 3</option>
          <option value="4">Clase 4</option>
          <option value="5">Clase 5</option>
          <option value="6">Clase 6</option>
          <option value="7">Clase 7</option>
          <option value="8">Clase 8</option>
          <option value="9">Clase 9</option>
          <option value="10">Clase 10</option>
        </select>

        <button class="btn btn-ok" onclick="aprobarYDesbloquear('${entrega.id}', '${entrega.user_email}', '${entrega.curso}')">
          Aprobar y desbloquear clase
        </button>
      </div>

      <textarea id="comentario-${entrega.id}" placeholder="Comentario para el alumno...">${entrega.comentario || ""}</textarea>

      <div class="actions">
        <button class="btn" onclick="guardarComentario('${entrega.id}')">Guardar comentario</button>
      </div>
    `;

    lista.appendChild(card);
  });
}

async function actualizarEstado(id, estado){
  const { error } = await supabase
    .from("entregas")
    .update({ estado })
    .eq("id", id);

  if(error){
    alert("Error actualizando estado: " + error.message);
    return;
  }

  cargarEntregas();
}

async function aprobarYDesbloquear(id, email, curso){
  const clase = Number(document.getElementById("clase-" + id).value);
  const cursoNormalizado = cursoKey(curso);

  const { error: entregaError } = await supabase
    .from("entregas")
    .update({ estado: "aprobado" })
    .eq("id", id);

  if(entregaError){
    alert("Error aprobando entrega: " + entregaError.message);
    return;
  }

  const { error: progresoError } = await supabase
    .from("progreso_alumnos")
    .upsert({
      user_email: email,
      curso: cursoNormalizado,
      clase_actual: clase,
      updated_at: new Date().toISOString()
    }, {
      onConflict: "user_email,curso"
    });

  if(progresoError){
    alert("Entrega aprobada, pero error desbloqueando clase: " + progresoError.message);
    return;
  }

  alert("✅ Aprobado y clase desbloqueada");
  cargarEntregas();
}

async function guardarComentario(id){
  const comentario = document.getElementById("comentario-" + id).value;

  const { error } = await supabase
    .from("entregas")
    .update({ comentario })
    .eq("id", id);

  if(error){
    alert("Error guardando comentario: " + error.message);
    return;
  }

  alert("Comentario guardado");
}

cargarEntregas();
</script>
</body>
</html>
