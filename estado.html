<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estado del alumno</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#070a0f;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,.05);
  border-radius:20px;
  padding:20px;
  text-align:center;
}

.estado{
  margin-top:20px;
  padding:15px;
  border-radius:10px;
  background:rgba(255,255,255,.08);
}
</style>
</head>

<body>

<div class="box">
  <h1>📊 Estado de tu curso</h1>

  <div class="estado">
    ✅ Actividad 1 — Aprobada  
  </div>

  <div class="estado">
    ⏳ Actividad 2 — En revisión  
  </div>

  <div class="estado">
    ❌ Actividad 3 — Falta entregar  
  </div>

</div>

</body>
</html>
