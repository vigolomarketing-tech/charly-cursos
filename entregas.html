<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Entregas | Campus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#070a0f;
  color:white;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.top a{
  text-decoration:none;
  background:#1e293b;
  padding:10px 14px;
  border-radius:999px;
  color:white;
  font-weight:bold;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.status{
  margin-top:10px;
  font-size:14px;
}

.info{
  margin-top:10px;
  padding:10px;
  background:#111827;
  border-radius:8px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<a href="modulo.html">← Volver</a>
<a href="login.html">Login</a>
</div>

<h1>📤 Entregar actividad / trabajo</h1>

<div class="info" id="infoEntrega"></div>

<div class="card">

<input type="text" id="nombre" placeholder="Tu nombre">
<select id="curso">
<option value="">Seleccionar curso</option>
<option>Personal Trainer</option>
<option>Musculación</option>
<option>Funcional & HIIT</option>
<option>Nutrición</option>
</select>

<input type="file" id="archivo">

<button onclick="subir()">Enviar entrega</button>

<div class="status" id="status"></div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://yfdiejyrhaaziceyeiuc.supabase.co",
"sb_publishable_fRXqVXDILy3hgUFvp341pA_qqZdcQ_d"
);

const params = new URLSearchParams(window.location.search);
const tipo = params.get("tipo") || "general";
const nombreEntrega = params.get("nombre") || "general";

document.getElementById("infoEntrega").innerText =
"Estás entregando: " + tipo + " - " + nombreEntrega;

async function subir(){

const nombre = document.getElementById("nombre").value;
const curso = document.getElementById("curso").value;
const archivo = document.getElementById("archivo").files[0];
const status = document.getElementById("status");

if(!nombre || !curso || !archivo){
status.innerText = "⚠️ Completá todo";
return;
}

const { data } = await supabase.auth.getUser();

if(!data.user){
status.innerText = "❌ Iniciá sesión";
return;
}

const fileName = Date.now() + "-" + archivo.name;

await supabase.storage
.from("entregas")
.upload(fileName, archivo);

const { data: urlData } = supabase.storage
.from("entregas")
.getPublicUrl(fileName);

await supabase.from("entregas").insert([{
user_email: data.user.email,
nombre: nombre,
curso: curso,
archivo_url: urlData.publicUrl,
tipo: tipo,
nombre_entrega: nombreEntrega,
estado: "pendiente"
}]);

status.innerText = "✅ Entregado";
}
</script>

</body>
</html>
