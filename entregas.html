<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entregar trabajo | Charly Cursos</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 600px at 20% 0%, rgba(96,214,255,.14), transparent 55%),
        radial-gradient(900px 600px at 85% 10%, rgba(90,107,255,.14), transparent 55%),
        #070a0f;
      color:white;
    }

    .container{
      width:min(760px,92%);
      margin:0 auto;
      padding:28px 0;
    }

    .top{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:white;
      text-decoration:none;
      font-weight:800;
      cursor:pointer;
    }

    .btn--primary{
      width:100%;
      border:none;
      background:linear-gradient(135deg,#60d6ff,#5a6bff);
      color:white;
      font-size:15px;
      margin-top:12px;
    }

    .card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      padding:20px;
      box-shadow:0 16px 60px rgba(0,0,0,.45);
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(30px,4vw,46px);
      letter-spacing:-.8px;
    }

    p{
      color:rgba(255,255,255,.70);
      line-height:1.6;
    }

    label{
      display:block;
      margin-top:14px;
      margin-bottom:6px;
      font-weight:800;
      color:rgba(255,255,255,.88);
    }

    input, select, textarea{
      width:100%;
      box-sizing:border-box;
      padding:13px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.92);
      color:#111;
      font-size:15px;
      outline:none;
    }

    textarea{
      min-height:95px;
      resize:vertical;
    }

    .status{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.86);
      display:none;
    }

    .userbox{
      margin:16px 0;
      padding:12px;
      border-radius:14px;
      background:rgba(96,214,255,.10);
      border:1px solid rgba(96,214,255,.18);
      color:rgba(255,255,255,.86);
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="top">
      <a class="btn" href="campus.html">← Volver al campus</a>
      <a class="btn" href="modulo.html">Ver módulos</a>
    </div>

    <h1>Entregar trabajo</h1>
    <p>Subí tu actividad o trabajo final para que Charly pueda corregirlo.</p>

    <div class="userbox" id="userBox">Verificando sesión...</div>

    <section class="card">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />

      <label for="curso">Curso</label>
      <select id="curso">
        <option value="">Seleccionar curso</option>
        <option value="Personal Trainer">Personal Trainer</option>
        <option value="Nutrición aplicada al deporte">Nutrición aplicada al deporte</option>
        <option value="Funcional & HIIT">Funcional & HIIT</option>
        <option value="Instructor de Musculación">Instructor de Musculación</option>
        <option value="Pack completo">Pack completo</option>
      </select>

      <label for="comentario">Comentario opcional</label>
      <textarea id="comentario" placeholder="Ej: Trabajo final de nutrición / Actividad clase 3"></textarea>

      <label for="archivo">Archivo</label>
      <input type="file" id="archivo" />

      <button class="btn btn--primary" onclick="subirTrabajo()">Enviar trabajo</button>

      <div class="status" id="status"></div>
    </section>
  </main>

  <script>
    const supabaseUrl = "https://yfdiejyrhaaziceyeiuc.supabase.co";
    const supabaseKey = "sb_publishable_fRXqVXDILy3hgUFvp341pA_qqZdcQ_d";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function verificarSesion(){
      const userBox = document.getElementById("userBox");
      const { data, error } = await supabase.auth.getUser();

      if(error || !data.user){
        userBox.innerHTML = "⚠️ No hay sesión iniciada. Primero ingresá desde login.";
        return null;
      }

      userBox.innerHTML = "✅ Sesión iniciada: <strong>" + data.user.email + "</strong>";
      return data.user;
    }

    function mostrarEstado(texto, error = false){
      const status = document.getElementById("status");
      status.style.display = "block";
      status.innerText = texto;
      status.style.borderColor = error ? "rgba(255,80,80,.35)" : "rgba(96,214,255,.25)";
    }

    async function subirTrabajo(){
      const nombre = document.getElementById("nombre").value.trim();
      const curso = document.getElementById("curso").value;
      const comentario = document.getElementById("comentario").value.trim();
      const archivo = document.getElementById("archivo").files[0];

      if(!nombre || !curso || !archivo){
        mostrarEstado("⚠️ Completá nombre, curso y archivo.", true);
        return;
      }

      const { data, error } = await supabase.auth.getUser();

      if(error || !data.user){
        mostrarEstado("❌ No estás logueado. Iniciá sesión antes de subir el trabajo.", true);
        return;
      }

      mostrarEstado("Subiendo archivo...");

      const nombreSeguro = archivo.name
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9._-]/g, "_");

      const fileName = `${data.user.id}/${Date.now()}-${nombreSeguro}`;

      const { error: uploadError } = await supabase.storage
        .from("entregas")
        .upload(fileName, archivo);

      if(uploadError){
        mostrarEstado("❌ Error al subir archivo: " + uploadError.message, true);
        return;
      }

      const { data: publicUrlData } = supabase.storage
        .from("entregas")
        .getPublicUrl(fileName);

      const archivo_url = publicUrlData.publicUrl;

      const { error: dbError } = await supabase
        .from("entregas")
        .insert([{
          user_email: data.user.email,
          nombre: nombre,
          curso: curso,
          archivo_url: archivo_url,
          comentario: comentario,
          estado: "pendiente"
        }]);

      if(dbError){
        mostrarEstado("❌ Error guardando en base de datos: " + dbError.message, true);
        return;
      }

      mostrarEstado("✅ Trabajo enviado correctamente. Queda pendiente de corrección.");

      document.getElementById("nombre").value = "";
      document.getElementById("curso").value = "";
      document.getElementById("comentario").value = "";
      document.getElementById("archivo").value = "";
    }

    verificarSesion();
  </script>
</body>
</html>
