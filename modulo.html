<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Campus | Entregas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📚 Campus del alumno</h1>
  <p>Subí tu trabajo final para que sea corregido.</p>

  <div class="card">
    <h2>📤 Entregar trabajo</h2>

    <input type="text" id="nombre" placeholder="Tu nombre" />

    <select id="curso">
      <option value="">Seleccionar curso</option>
      <option>Personal Trainer</option>
      <option>Musculación</option>
      <option>Funcional & HIIT</option>
      <option>Nutrición</option>
    </select>

    <input type="file" id="archivo" />

    <button onclick="subirTrabajo()">Subir trabajo</button>

    <div class="status" id="status"></div>
  </div>
</div>

<script>
  const supabaseUrl = "https://yfdiejyrhaaziceyeiuc.supabase.co";
  const supabaseKey = "TU_PUBLIC_ANON_KEY";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function subirTrabajo() {
    const nombre = document.getElementById("nombre").value;
    const curso = document.getElementById("curso").value;
    const archivo = document.getElementById("archivo").files[0];
    const status = document.getElementById("status");

    if (!nombre || !curso || !archivo) {
      status.innerText = "⚠️ Completá todos los campos";
      return;
    }

    status.innerText = "Subiendo archivo...";

    const { data: userData } = await supabase.auth.getUser();
    const email = userData?.user?.email;

    if (!email) {
      status.innerText = "❌ No estás logueado";
      return;
    }

    const fileName = `${Date.now()}-${archivo.name}`;

    // SUBIR ARCHIVO
    const { error: uploadError } = await supabase.storage
      .from("entregas")
      .upload(fileName, archivo);

    if (uploadError) {
      status.innerText = "❌ Error al subir archivo";
      console.log(uploadError);
      return;
    }

    // OBTENER URL
    const { data: publicUrlData } = supabase.storage
      .from("entregas")
      .getPublicUrl(fileName);

    const archivo_url = publicUrlData.publicUrl;

    // GUARDAR EN BD
    const { error: dbError } = await supabase
      .from("entregas")
      .insert([
        {
          user_email: email,
          nombre: nombre,
          curso: curso,
          archivo_url: archivo_url,
          estado: "pendiente"
        }
      ]);

    if (dbError) {
      status.innerText = "❌ Error guardando en base de datos";
      console.log(dbError);
      return;
    }

    status.innerText = "✅ Trabajo enviado correctamente";

    document.getElementById("nombre").value = "";
    document.getElementById("curso").value = "";
    document.getElementById("archivo").value = "";
  }
</script>

</body>
</html>
