<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Entregas | Campus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      margin:0;
      font-family:system-ui;
      background:#070a0f;
      color:white;
    }

    .container{
      max-width:700px;
      margin:auto;
      padding:20px;
    }

    h1{margin-bottom:10px;}

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-top:20px;
    }

    input, select{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:none;
    }

    button{
      margin-top:15px;
      padding:12px;
      width:100%;
      background:#22c55e;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    .status{
      margin-top:10px;
      font-size:14px;
    }

    .top{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .top a{
      text-decoration:none;
      background:#1e293b;
      padding:10px 14px;
      border-radius:999px;
      color:white;
      font-weight:bold;
    }

    .user{
      margin-top:10px;
      font-size:14px;
      color:#aaa;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top">
    <a href="modulo.html">← Volver al módulo</a>
    <a href="login.html">Login</a>
  </div>

  <h1>📤 Entregar actividad / trabajo final</h1>
  <p>Subí tu archivo para que el profesor lo revise y corrija.</p>

  <div class="user" id="userBox">Verificando sesión...</div>

  <div class="card">

    <input type="text" id="nombre" placeholder="Tu nombre completo">

    <select id="curso">
      <option value="">Seleccionar curso</option>
      <option>Personal Trainer</option>
      <option>Musculación</option>
      <option>Funcional & HIIT</option>
      <option>Nutrición</option>
      <option>Pack completo</option>
    </select>

    <input type="file" id="archivo">

    <button onclick="subirTrabajo()">Enviar entrega</button>

    <div class="status" id="status"></div>

  </div>

</div>

<script>
const supabaseUrl = "https://yfdiejyrhaaziceyeiuc.supabase.co";
const supabaseKey = "sb_publishable_fRXqVXDILy3hgUFvp341pA_qqZdcQ_d";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function verificarSesion(){
  const { data } = await supabase.auth.getUser();
  const box = document.getElementById("userBox");

  if(!data.user){
    box.innerText = "❌ No estás logueado";
    return;
  }

  box.innerText = "✅ " + data.user.email;
}

async function subirTrabajo(){
  const nombre = document.getElementById("nombre").value;
  const curso = document.getElementById("curso").value;
  const archivo = document.getElementById("archivo").files[0];
  const status = document.getElementById("status");

  if(!nombre || !curso || !archivo){
    status.innerText = "⚠️ Completá todos los campos";
    return;
  }

  const { data } = await supabase.auth.getUser();

  if(!data.user){
    status.innerText = "❌ Tenés que iniciar sesión";
    return;
  }

  const email = data.user.email;

  status.innerText = "Subiendo archivo...";

  const fileName = Date.now() + "-" + archivo.name;

  const { error: uploadError } = await supabase.storage
    .from("entregas")
    .upload(fileName, archivo);

  if(uploadError){
    status.innerText = "❌ Error subiendo archivo";
    console.log(uploadError);
    return;
  }

  const { data: urlData } = supabase.storage
    .from("entregas")
    .getPublicUrl(fileName);

  const archivo_url = urlData.publicUrl;

  const { error: dbError } = await supabase
    .from("entregas")
    .insert([
      {
        user_email: email,
        nombre: nombre,
        curso: curso,
        archivo_url: archivo_url,
        estado: "pendiente"
      }
    ]);

  if(dbError){
    status.innerText = "❌ Error guardando en base de datos";
    console.log(dbError);
    return;
  }

  status.innerText = "✅ Entrega enviada correctamente";

  document.getElementById("nombre").value = "";
  document.getElementById("curso").value = "";
  document.getElementById("archivo").value = "";
}

verificarSesion();
</script>

</body>
</html>
